function priceBox(p){
  if(p.free) return `<div class="pb">✅ <strong>Vstup zadarmo</strong>${p.cn?'<br>💡 '+p.cn:''}</div>`;
  if(!p.ap) return '';
  const ch=p.cp2||p.cp;
  const tot=(p.ap*2+ch*2).toFixed(2);
  return `<div class="pb"><table>
    <tr><td>🧑 Dospelý ×2:</td><td>${(p.ap*2).toFixed(1)} €</td></tr>
    <tr><td>👶 Dieťa${p.cn?' ('+p.cn+')':''} ×2:</td><td>${(ch*2).toFixed(1)} €</td></tr>
    <tr class="tr"><td>👨‍👩‍👧‍👦 Rodina 2+2:</td><td>${tot} €</td></tr>
  </table></div>`;
}

function contentA(p){
  const dh=distKm(H.lat,H.lng,p.lat,p.lng).toFixed(1);
  const du=uLat?distKm(uLat,uLng,p.lat,p.lng).toFixed(1)+' km':'📱 zapnite GPS';
  return `<h3>${p.name}</h3>
    <div class="ir"><span class="ic">🏷️</span><span><em>${p.local}</em></span></div>
    <div class="ir"><span class="ic">📍</span><span>${p.address}</span></div>
    <div class="ir"><span class="ic">🕐</span><span>${p.hours}</span></div>
    <div class="ir"><span class="ic">ℹ️</span><span>${p.desc}</span></div>
    ${priceBox(p)}
    <div class="dr">🏨 Od hotela: <strong>${dh} km</strong> (~${Math.round(parseFloat(dh)*1.3)} min)</div>
    <div class="dr">📱 Od vás: <strong>${du}</strong></div>
    <a class="wb" href="${wz(p.lat,p.lng)}" target="_blank">🚗 Naviguj cez Waze</a>
    ${p.web?`<div class="link-row">🌐 <a href="${p.web}" target="_blank">Oficiálna stránka</a></div>`:''}`;
}

function showInfo(marker,html,popupClass){
  if(isMobile()){
    openPanel(html);
  }else{
    marker.unbindPopup();
    marker.bindPopup(`<div class="pc">${html}</div>`,{className:popupClass||'cp',maxWidth:350,autoPan:true,autoPanPaddingTopLeft:[20,80],autoPanPaddingBottomRight:[20,20]}).openPopup();
  }
}

    uLat=pos.coords.latitude;uLng=pos.coords.longitude;
    if(!window._uMk){
      const ui=L.divIcon({html:'<div style="background:#2196f3;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 10px #2196f3;animation:pulse 2s infinite"></div>',className:'',iconSize:[14,14],iconAnchor:[7,7]});
      window._uMk=L.marker([uLat,uLng],{icon:ui,zIndexOffset:900}).addTo(map).bindTooltip('📱 Vy',{permanent:false,direction:'top'});
    }else{window._uMk.setLatLng([uLat,uLng])}
  },()=>{},{enableHighAccuracy:true,maximumAge:30000});
}

const OW_KEY='c21523e4f39e117b8e102abe90ec9ab3';

function weatherIcon(code){
  if(code<300)return'⛈️';if(code<500)return'🌧️';if(code<600)return'🌧️';
  if(code<700)return'❄️';if(code<800)return'🌫️';if(code===800)return'☀️';
  if(code<=802)return'🌤️';return'☁️';
}

function createWO(wp,d){
  const ic=L.divIcon({
    html:`<div class="wov">
      <div class="wl">${wp.label}</div>
      <div class="wt">${d.icon} ${d.temp}°C</div>
      <div>💨 ${d.wind} km/h ${d.dir}</div>
      <div class="ws">${d.desc}</div>
    </div>`,
    className:'',iconSize:[90,55],iconAnchor:[45,27]
  });
  L.marker([wp.lat,wp.lng],{icon:ic,interactive:false,zIndexOffset:400}).addTo(map);
}

WP.forEach(wp=>{
  fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(wp.city)}&units=metric&lang=sk&appid=${OW_KEY}`)
    .then(r=>r.json()).then(d=>{
      if(d.cod===200){
        createWO(wp,{temp:Math.round(d.main.temp),wind:(d.wind.speed*3.6).toFixed(0),dir:d2c(d.wind.deg||0),desc:d.weather[0].description,icon:weatherIcon(d.weather[0].id)});
      }else{fbW(wp)}
    }).catch(()=>{fbW(wp)});
});
function fbW(wp){createWO(wp,{temp:'—',wind:'—',dir:'—',desc:'nedostupné',icon:'❓'})}

document.head.appendChild(st);
